{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your pantry and generate AI recipes with NutriFitness.">
  <meta name="theme-color" content="#9b59b6">
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <link rel="apple-touch-icon" href="{% static 'icons/icon-192.png' %}">
  <title>My Pantry — NutriFitness</title>
  <link rel="stylesheet" href="{% static 'pantry.css' %}">
  {% if GOOGLE_ANALYTICS_ID %}
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ GOOGLE_ANALYTICS_ID }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ GOOGLE_ANALYTICS_ID }}');
  </script>
  {% endif %}
</head>
<body>

  {% include 'navbar.html' %}

  <div class="pantry-container">
    <h1>My Pantry</h1>

    <div class="pantry-items" id="pantryItems">
      <!-- Pantry items will be injected here by JS -->
      <p class="empty-message">Your pantry is empty. Scan items to add them!</p>
    </div>
  </div>

  <div class="recipe-section">
      <button id="generateRecipeBtn" class="generate-recipe-btn">🍳 Generate Recipe</button>
      <button id="retryRecipeBtn" class="retry-btn" style="display: none;">↻</button>
      <div id="recipeResult" class="recipe-result"></div>
  </div>

  <!-- Floating scan button -->
  <div id="scanButton" class="scan-button">+</div>

  <!-- Scan Overlay -->
  <div id="scanOverlay" class="overlay">
    <div class="overlay-box">
      <h2>Add to Pantry</h2>
      <div class="scanner-area">
        <video id="camera" width="300" height="200" autoplay playsinline></video>
        <button class="capture-btn" id="captureBtn">📷 Scan Barcode</button>
        <p id="scanResult">Point camera at barcode</p>
      </div>
      <p class="close-hint">Tap outside to close</p>
    </div>
  </div>

  <!-- Inject pantry data from Django -->
  <script>
    const pantryData = {{ pantry_data|safe }};
  </script>

  <script src="{% static 'pantry.js' %}"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/service-worker.js');
    }
    {% if GOOGLE_ANALYTICS_ID %}
    document.addEventListener('recipeGenerated', function() {
      gtag('event', 'recipe_generated', { event_category: 'ai' });
    });
    {% endif %}
  </script>
</body>
</html>
